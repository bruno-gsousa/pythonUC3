<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Verificador de Idade</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>
<body class="bg-light">

<div class="container">

    <div class="row justify-content-center mt-5">

        <div class="col-md-6">

            <div class="card shadow">

                <div class="card-header text-center">
                    <h2>Verificação de Idade</h2>
                </div>

                <div class="card-body">

                    <form method="POST">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label">
                                Informe sua idade
                            </label>

                            <input
                                type="number"
                                class="form-control"
                                name="idade"
                                min="0"
                                required>
                        </div>

                        <button class="btn btn-primary w-100">
                            Verificar
                        </button>

                    </form>

                    {% if conteudo %}

                    <div class="alert alert-success mt-4">
                        <h4>Acesso liberado!</h4>

                        <hr>

                        <h5>Conteúdo Exclusivo</h5>

                        <p>
                            Bem-vindo! Você possui idade suficiente para acessar este conteúdo.
                        </p>

                        <img
                            src="https://picsum.photos/600/300"
                            class="img-fluid rounded"
                            alt="Imagem">
                    </div>

                    {% endif %}

                    {% if mensagem %}

                    <div class="alert alert-danger mt-4">
                        {{ mensagem }}
                    </div>

                    {% endif %}

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
